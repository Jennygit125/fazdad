<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="description" content="FAZDAD Logistics - End-to-end logistics services for smooth and efficient goods movement.">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>FAZDAD LOGISTICS</title>
        <link rel="stylesheet" href="style.css">
          <script src=\"script.js\" defer></script>
    </head>
    <body>
        <div class="hero">
            <div class="hero-top">
                <div class="truck-left">
                    <div class="image-container">
                        <img src="Truck1.jpg" alt="Red logistics truck carrying cargo on the road" loading="lazy">
                    </div>
                </div>
                <div class="hero-right">
                    <h1>FAZDAD<br>LOGISTICS<br>RESOURCES</h1>

            <div class="hero-bottom">
                <div class="hero-left">
                    <button class="call-btn">CALL NOW</button>
                    <div class="phone-info">
                        <span class="phone-icon">📞</span>
                        <span class="phone-number">08036761616</span>
                    </div>
                    <div class="decorative-arrows">>>> </div>
                </div>
                <div class="truck-right">
                    <div class="image-container">
                        <img src="Truck2.jpg" alt="Red logistics truck carrying cargo on the road" loading="lazy">
                    </div>
                </div>
            </div>
        </div>
        <script src=\"script.js\" defer></script>
