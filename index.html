<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>FAZDAD LOGISTICS</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header class="site-header">
        <div class="logo-container">
    <a href="home.html" aria-label="Fazdad Logistics Home" id="logo-placeholder">
        </a>
</div>
<div class="navigation">
        <a href="about.html" aria-label="About Us">
            about </a>
            <nav>...</nav>
</div>
  
</header>
        <div class="container">
            <div id="text-left">
                    <h1>FAZDAD LOGISTICS RESOURCES<br></h1><br>
                    We provide end-to-end logistics services to ensure smooth and efficient movement of your goods, from pickup to final delivery.
                </div>
                <div id="login-Container">
                    <h2>FAZDAD LOGISTICS</h2>
                   <div class="forms-container">
                    <button type="button" id="loginFormButton">Login</button>
                    <button type="button" id="registerFormButton">Register</button>
                   </div>
                    <form id="loginForm">
                        <input type="text" id="username" name="username" placeholder="Username" required>
                        <input type="password" id="password" name="password" placeholder="Password" required>
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        Remember Me
                        <br>
                        <button type="submit">Login</button>
                        <button type="button" id="forgotPassword">Forgot Password?</button>
                    </form>
                    <form id="registerForm">
                        <input type="text" id="registerUsername" name="registerUsername" placeholder="Username" required>
                        <input type="password" id="registerPassword" name="registerPassword" placeholder="Password" required>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
                        <button type="submit">Register</button>
                    </form>
                </div>
        </div>
        <footer>contact us at info@fazdad.com</footer>
        <script src="script.js" defer></script>
    </body>
</html>
