<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>FAZDAD LOGISTICS</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header class="site-header">
        <div class="logo-container">
    <a href="index.html" aria-label="Fazdad Logistics Home" id="logo-placeholder">
        </a>
</div>
<selector class="navigation">
        <a href="index.html">Home</a>
            <a href="about.html" class="active">About</a>
            <a href="services.html">Services</a>
            <a href="login.html">login</a>
</selector>
  
</header>
        <div class="container">
            <div id="text-left">
                    <h1>FAZDAD LOGISTICS RESOURCES<br></h1><br>
                    We provide end-to-end logistics services to ensure smooth and efficient movement of your goods, from pickup to final delivery.
                </div>
                <div id="login-Container">
                    <h2 class="overlay-text">FAZDAD LOGISTICS</h2>
                   <div class="forms-container">
                    <button type="button" id="loginFormButton">Login</button>
                    <button type="button" id="registerFormButton">Register</button>
                   </div>
                    <form id="loginForm">
                        <input type="text" class="Username" name="username" placeholder="Username" required>
                        <input type="password" class="Password" name="password" placeholder="Password" required>
                       <div class="checkbox">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <label for="rememberMe" class="overlay-text">Remember Me</label>
                        <button type="button" id="forgotPassword">Forgot Password</button>
                        </div>
                        <button type="submit" id="login">Login</button>
                        
                    </form>
                    <form id="registerForm">
                        <input type="text" class="Username" name="SetUsername" placeholder="Set Username" required>
                        <input type="password" class="Password" name="SetPassword" placeholder="Set Password" required>
                        <input type="password" class="Password" name="confirmPassword" placeholder="Confirm Password" required>
                        <button id="register" type="submit">Register</button>
                    </form>
                </div>
        </div>
        <footer>contact us at info@fazdad.com</footer>
        <script src="script.js" defer></script>
    </body>
</html>
